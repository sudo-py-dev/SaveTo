name: Publish Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Keystore
      run: |
        echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > app/release-key.jks

    - name: Create Keystore Properties
      run: |
        cat <<EOF > keystore.properties
        storeFile=release-key.jks
        storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
        keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
        keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
        EOF

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Release APKs & Bundles
      run: ./gradlew assembleRelease bundleRelease

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/googlePlay/release/app-googlePlay-release.apk
          app/build/outputs/apk/foss/release/app-foss-release.apk
          app/build/outputs/bundle/googlePlayRelease/app-googlePlay-release.aab
          app/build/outputs/bundle/fossRelease/app-foss-release.aab
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
